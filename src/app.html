<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />
		<!--
		  Apply the theme synchronously before SvelteKit renders so we never
		  flash the wrong scheme. Mirrors the logic in src/lib/theme.svelte.ts.
		-->
		<script>
			(function () {
				try {
					var stored = localStorage.getItem('curiomancer:theme');
					var effective =
						stored === 'light' || stored === 'dark'
							? stored
							: window.matchMedia('(prefers-color-scheme: dark)').matches
								? 'dark'
								: 'light';
					if (effective === 'dark') document.documentElement.classList.add('dark');
					document.documentElement.style.colorScheme = effective;
				} catch (_) {
					/* localStorage blocked - fall back to whatever the CSS resolves. */
				}
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
